# ======================== GENERAL ========================
port 6379
dir /data

# ======================== MEMORY MANAGEMENT (TTL/EVICTION) ========================
# Set max memory limit (adjust based on your server capacity)
maxmemory 256mb

# Eviction Policy: volatile-ttl
# Evict keys with an expire set, and try to evict keys with a shorter time to live (TTL) first.
# This is ideal for chat applications where old messages or temporary sessions can be discarded.
maxmemory-policy volatile-ttl

# ======================== SNAPSHOTTING (RDB) ========================
# Save the DB on disk (Snapshotting):
# save <seconds> <changes>
# Less frequent RDB saves to reduce CPU/Disk I/O impact, relying on AOF for durability.
save 900 1      # Save after 900 sec (15 min) if at least 1 key changed
save 300 10     # Save after 300 sec (5 min) if at least 10 keys changed
save 60 10000   # Save after 60 sec if at least 10000 keys changed

# Compress string objects using LZF when dump .rdb databases?
rdbcompression yes

# The filename where to dump the DB
dbfilename dump.rdb

# ======================== APPEND ONLY MODE (AOF) ========================
# Enable AOF for better data durability.
appendonly yes

# The name of the append only file (default: "appendonly.aof")
appendfilename "appendonly.aof"

# The fsync() call tells the Operating System to actually write data on disk.
# "everysec": fsync every second. Fast enough, and you may lose 1 second of data if there is a disaster.
# This is the best compromise between performance and data safety.
appendfsync everysec

# Rewrite AOF when it grows too large to optimize file size.
# Rewrite when AOF is 100% larger than the base size (since last rewrite).
auto-aof-rewrite-percentage 100
# And the minimum size of the AOF file to trigger a rewrite.
auto-aof-rewrite-min-size 64mb

# ======================== HYBRID PERSISTENCE ========================
# Enable RDB-AOF hybrid persistence (Available in Redis 4.0+)
# When AOF rewrite occurs, it will first write an RDB preamble, then append AOF commands.
# This results in faster restarts and smaller AOF files.
aof-use-rdb-preamble yes
